services:
  badge-leaderboard:
    build: ./
    env_file: ".env"
    restart: unless-stopped
    networks:
      - proxied
    environment:
      - FLASK_ENV=production
    volumes:
      - type: bind
        source: badges.jsonl
        target: /app/src/badges.jsonl
    healthcheck:
      test: "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      caddy: badges.areazerotcg.com
      caddy.reverse_proxy: "{{ upstreams 8000 }}"
