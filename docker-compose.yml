services:
  badge-leaderboard:
    build: ./
    env_file: ".env"
    restart: unless-stopped
    networks:
      - proxied
    environment:
      - FLASK_ENV=production
      # All JSONL/JSON data lives in this bind-mounted directory. Files inside
      # (badges.jsonl, events_2027.jsonl, discord_ids.json, ...) are created by
      # the app on demand -- they don't need to pre-exist.
      - TH_BL_DATA_DIR=/app/data
    volumes:
      - type: bind
        source: ./data
        target: /app/data
    healthcheck:
      test: "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      caddy: badges.areazerotcg.com
      caddy.reverse_proxy: "{{ upstreams 8000 }}"
